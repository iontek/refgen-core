# Local "city" of services. Each service is internal-only by default and reachable
# by name over refgen-core-net. As the gateway lands it becomes the only host port;
# for now identity-svc is exposed directly so it can be verified standalone.

x-svc: &svc
  restart: unless-stopped
  # refgen-core-net = the dxm "city"; refgen-net = the shared MCP substrate
  # (external, owned by the platform stack) so dxm services can reach the
  # engine MCPs by name, e.g. http://primer3-mcp:3017/. postgres stays off it.
  networks: [refgen-core-net, refgen-net]

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    networks: [refgen-core-net]
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: postgres
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./docker/postgres-init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 10

  identity-svc:
    <<: *svc
    image: refgen/identity-svc:0.1.0
    build:
      context: .
      dockerfile: services/identity-svc/Dockerfile
    environment:
      JWT_SECRET: ${JWT_SECRET:-dev-insecure-change-me}
      JWT_ALGORITHM: ${JWT_ALGORITHM:-HS256}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      DATABASE_URL: postgresql+psycopg2://postgres:${POSTGRES_PASSWORD:-postgres}@postgres:5432/identity
      AUTH_REQUIRED: "true"
      ADMIN_USERNAME: ${ADMIN_USERNAME:-admin}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-admin}
      ADMIN_TENANT: ${ADMIN_TENANT:-refgen}
    ports:
      - "8011:8000"     # standalone verification; gateway will front this later
    depends_on:
      postgres:
        condition: service_healthy

  panels-svc:
    <<: *svc
    image: refgen/panels-svc:0.1.0
    build:
      context: .
      dockerfile: services/panels-svc/Dockerfile
    environment:
      JWT_SECRET: ${JWT_SECRET:-dev-insecure-change-me}
      JWT_ALGORITHM: ${JWT_ALGORITHM:-HS256}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      DATABASE_URL: postgresql+psycopg2://postgres:${POSTGRES_PASSWORD:-postgres}@postgres:5432/panels
      AUTH_REQUIRED: "true"
    ports:
      - "8012:8000"     # standalone verification; gateway will front this later
    depends_on:
      postgres:
        condition: service_healthy

  registry-svc:
    <<: *svc
    image: refgen/registry-svc:0.1.0
    build:
      context: .
      dockerfile: services/registry-svc/Dockerfile
    environment:
      JWT_SECRET: ${JWT_SECRET:-dev-insecure-change-me}
      JWT_ALGORITHM: ${JWT_ALGORITHM:-HS256}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      DATABASE_URL: postgresql+psycopg2://postgres:${POSTGRES_PASSWORD:-postgres}@postgres:5432/registry
      AUTH_REQUIRED: "true"
    ports:
      - "8013:8000"     # standalone verification; gateway fronts it in prod
    depends_on:
      postgres:
        condition: service_healthy

  design-svc:
    <<: *svc
    image: refgen/design-svc:0.1.0
    build:
      context: .
      dockerfile: services/design-svc/Dockerfile
    environment:
      JWT_SECRET: ${JWT_SECRET:-dev-insecure-change-me}
      JWT_ALGORITHM: ${JWT_ALGORITHM:-HS256}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      DATABASE_URL: postgresql+psycopg2://postgres:${POSTGRES_PASSWORD:-postgres}@postgres:5432/design
      AUTH_REQUIRED: "true"
    ports:
      - "8014:8000"     # standalone verification; gateway fronts it in prod
    depends_on:
      postgres:
        condition: service_healthy

  gateway:
    <<: *svc
    image: refgen/gateway:0.1.0
    build:
      context: .
      dockerfile: services/gateway/Dockerfile
    environment:
      JWT_SECRET: ${JWT_SECRET:-dev-insecure-change-me}
      JWT_ALGORITHM: ${JWT_ALGORITHM:-HS256}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      IDENTITY_URL: http://identity-svc:8000
      PANELS_URL: http://panels-svc:8000
      REGISTRY_URL: http://registry-svc:8000
      DESIGN_URL: http://design-svc:8000
    ports:
      - "8090:8000"     # single host-facing door (8080 is taken by the platform's igv-viewer)
    depends_on:
      - identity-svc
      - panels-svc
      - registry-svc
      - design-svc

networks:
  refgen-core-net:
    driver: bridge
  refgen-net:
    external: true        # the shared MCP substrate network (created by the platform)

volumes:
  pgdata:
