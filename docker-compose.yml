# Local "city" of services. Each service is internal-only by default and reachable
# by name over refgen-core-net. As the gateway lands it becomes the only host port;
# for now identity-svc is exposed directly so it can be verified standalone.

x-svc: &svc
  restart: unless-stopped
  networks: [refgen-core-net]

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    networks: [refgen-core-net]
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: postgres
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./docker/postgres-init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 10

  identity-svc:
    <<: *svc
    image: refgen/identity-svc:0.1.0
    build:
      context: .
      dockerfile: services/identity-svc/Dockerfile
    environment:
      JWT_SECRET: ${JWT_SECRET:-dev-insecure-change-me}
      JWT_ALGORITHM: ${JWT_ALGORITHM:-HS256}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      DATABASE_URL: postgresql+psycopg2://postgres:${POSTGRES_PASSWORD:-postgres}@postgres:5432/identity
      AUTH_REQUIRED: "true"
      ADMIN_USERNAME: ${ADMIN_USERNAME:-admin}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-admin}
      ADMIN_TENANT: ${ADMIN_TENANT:-refgen}
    ports:
      - "8011:8000"     # standalone verification; gateway will front this later
    depends_on:
      postgres:
        condition: service_healthy

networks:
  refgen-core-net:
    driver: bridge

volumes:
  pgdata:
